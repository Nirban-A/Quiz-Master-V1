<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Login</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>

</head>
<body>

<div class="container mt-5 p-4 border rounded shadow bg-white" style="max-width: 500px; text-align: center;">
    <h2 class="text-primary">Welcome to Quiz Master</h2>
    <p class="login-text">Login</p>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3 text-start">
            <label for="username" class="form-label">E-mail :</label>
            <input type="email" class="form-control border-primary" id="username" name="username" required>
        </div>
        <div class="mb-3 text-start">
            <label for="password" class="form-label">Password:</label>
            <input type="password" class="form-control border-primary" id="password" name="password" required>
        </div>

    {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
            {% for category, message in messages %}
                <p class="alert alert-{{ category }}">{{ message}}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="signup mt-3"> <a href="{{ url_for('register') }}">Create new user?</a></p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
