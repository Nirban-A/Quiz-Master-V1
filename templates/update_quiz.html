<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Quiz</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>

    <div class="container mt-5 p-4 border rounded shadow bg-white" style="max-width: 500px; text-align: center;">
        <h2 class="text-warning">Update Quiz</h2>

        <form method="POST"
            action="{{ url_for('update_quiz', curr_login_id=session['user_id'],subject_id=subject.id,quiz_id=quiz_id) }}">
            <div class="mb-3 text-start">
                <select type="text" class="form-control border-primary" id="chapter_id" name="chapter_id" required>
                    {% for chapter in subject.chapters %}
                    <option value="{{chapter.id}}">{{loop.index}} . {{chapter.name}}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3 text-start">
                <label for="time_of_quiz" class="form-label">Time duration of Quiz:</label>
                <input type="time" class="form-control border-primary" id="time_of_quiz" name="time_of_quiz">
            </div>
            <div class="mb-3 text-start">
                <label for="date_of_quiz" class="form-label">Date of Quiz:</label>
                <input type="date" class="form-control border-primary" id="date_of_quiz" name="date_of_quiz">
            </div>

            <div class="mb-3 text-start">
                <label for="quiz_remarks" class="form-label">Remarks :</label>

                <textarea class="form-control border-primary" id="quiz_remarks" name="quiz_remarks" rows="3"></textarea>
            </div>

            {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
            {% for category, message in messages %}
            <p class="alert alert-{{ category }}">{{ message}}</p>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <button type="submit" class="btn btn-primary me-2">Save</button>
            <a href="{{ url_for('update_quiz_choose_subject', curr_login_id=session['user_id'],quiz_id=quiz_id)}}"
                class="btn btn-primary">Back</a>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
