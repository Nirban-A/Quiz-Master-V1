<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">
        <!-- Header Section -->
        <div class="d-flex justify-content-between align-items-center">
            <h2 class="text-primary fw-bold">{% block header %} {% endblock %}</h1>
            <div >
                <a href="{{ url_for('user_dashboard', curr_login_id=session['user_id'])}}" class="me-3">Home</a>
                <a href="{{ url_for('user_score', curr_login_id=session['user_id'])}}" class="me-3">Score</a>
                <a href="{{ url_for('logout') }}" class="me-3">Logout</a>
            </div>
        </div>

        {% block extend %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
