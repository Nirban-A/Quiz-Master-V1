<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>


<form method="POST" id="quiz-form">
    <template data-time="{{quiz.time_duration}}"></template>
    <!-- Question Cards  -->
    <div class="row mt-4">
        <h4 class="sticky-top bg-body-secondary p-2 shadow-sm rounded">Time left: <span id="time-left">--:--<span></h4>
        <!-- Each quiz card -->
        {% for question in quiz.questions %}
        <div class="col-md-12">
            <div class="card shadow-sm m-3 p-3">
                <!-- Display Question Statement -->
                <label for="question_statement" class="fw-bold">{{ loop.index }}. {{ question.statement }}</label>

                <div class="d-flex flex-column mt-2">
                    <!-- Radio Buttons (Same name for all options of a question) -->
                    <div>
                        <input type="radio" id="option1_{{ question.id }}" name="answer_{{ question.id }}" value="1">
                        <label for="option1_{{ question.id }}">{{ question.option_1 }}</label>
                    </div>
                    <div>
                        <input type="radio" id="option2_{{ question.id }}" name="answer_{{ question.id }}" value="2">
                        <label for="option2_{{ question.id }}">{{ question.option_2 }}</label>
                    </div>
                    <div>
                        <input type="radio" id="option3_{{ question.id }}" name="answer_{{ question.id }}" value="3">
                        <label for="option3_{{ question.id }}">{{ question.option_3 }}</label>
                    </div>
                    <div>
                        <input type="radio" id="option4_{{ question.id }}" name="answer_{{ question.id }}" value="4">
                        <label for="option4_{{ question.id }}">{{ question.option_4 }}</label>
                    </div>
                </div>

                <!-- Submit Button -->

            </div>
        </div>
        {% endfor %}
        <div class="col-12 ps-4 pb-4">
            <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </div>
    </div>
</form>
<script>
    function autoSubmit() {
    const timeStr = document.querySelector("template[data-time]").getAttribute("data-time");

    // If there's no time limit, just show "No Limit" and return
    if (!timeStr || timeStr === "None") {
        document.getElementById("time-left").textContent = "No Limit";
        return;
    }

    // Convert timeStr ("HH:MM:SS") into total seconds
    const [hours, minutes, seconds] = timeStr.split(":").map(Number);
    let totalTimeInSeconds = (hours * 3600) + (minutes * 60) + seconds;

    // Countdown interval
    const countdownInterval = setInterval(() => {
        if (totalTimeInSeconds <= 0) {
            clearInterval(countdownInterval);
            document.getElementById("time-left").textContent = "00:00";
            
            // Auto-submit the form when time runs out
            document.getElementById("quiz-form").submit();
            return;
        }

        // Calculate remaining minutes and seconds
        let remainingMinutes = Math.floor(totalTimeInSeconds / 60);
        let remainingSeconds = totalTimeInSeconds % 60;

        // Format with leading zeros
        document.getElementById("time-left").textContent =
            `${String(remainingMinutes).padStart(2, "0")}:${String(remainingSeconds).padStart(2, "0")}`;

        // Decrement time
        totalTimeInSeconds--;
    }, 1000);
}

// Start the countdown when the page loads
autoSubmit();

</script>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
