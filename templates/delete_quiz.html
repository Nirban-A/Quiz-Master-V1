<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Quiz</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<div class="container mt-5 p-4 border rounded shadow bg-white" style="max-width: 500px; text-align: center;">
    <h2 class="text-warning">Do you want to remove this Quiz?</h2>
    
    <form method="POST" action="{{ url_for('delete_quiz', curr_login_id=session['user_id'], quiz_id=quiz_id) }}">

    <!--form method="POST" -->

        {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="alert alert-{{ category }}">{{ message}}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}        
            <button type="submit" class="btn btn-primary me-2">Confirm</button>
        <a href="{{ url_for('quiz_dashboard', curr_login_id=session['user_id'])}}" class="btn btn-primary">Cancel</a>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
