<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Subject</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<div class="container mt-5 p-4 border rounded shadow bg-white" style="max-width: 500px; text-align: center;">
    <h2 class="text-warning">Choose Subject</h2>
    
    <form method="POST" action="{{ url_for('create_quiz_choose_subject', curr_login_id=session['user_id']) }}">
        <div class="mb-3 text-start">
            <select type="text" class="form-control border-primary" id="subject" name="subject" required>
                {% for subject in subjects%}
                <option value="{{subject.id}}">{{loop.index}} . {{subject.name}}</option>
                {% endfor %}
                </select>
        </div>
     
        <button type="submit" class="btn btn-primary me-2">Save</button>
        <a href="{{ url_for('quiz_dashboard', curr_login_id=session['user_id'])}}" class="btn btn-primary">Cancel</a>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
