<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Subject</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<div class="container mt-5 p-4 border rounded shadow bg-white" style="max-width: 500px; text-align: center;">
    <h2 class="text-warning">New Subject</h2>
    
    <form method="POST" action="{{ url_for('create_subject', curr_login_id=session['user_id']) }}">
        <div class="mb-3 text-start">
            <label for="subject_name" class="form-label">Name :</label>
            <input type="text" class="form-control border-primary" id="subject_name" name="subject_name" required>
        </div>
        <div class="mb-3 text-start">
            <label for="subject_description" class="form-label">Description :</label>
            <!--input type="text" class="form-control border-primary" id="subject_description" name="subject_description" -->

            <textarea class="form-control border-primary" id="subject_description" name="subject_description" rows="3" ></textarea>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
            {% for category, message in messages %}
                <p class="alert alert-{{ category }}">{{ message}}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}       
     
        <button type="submit" class="btn btn-primary me-2">Save</button>
        <a href="{{ url_for('admin_dashboard', curr_login_id=session['user_id'])}}" class="btn btn-primary">Cancel</a>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
