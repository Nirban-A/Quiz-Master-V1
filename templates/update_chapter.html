<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Subject</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<div class="container mt-5 p-4 border rounded shadow bg-white" style="max-width: 500px; text-align: center;">
    <h2 class="text-warning">Update Chapter</h2>
    
    <form method="POST" action="{{ url_for('update_chapter', curr_login_id=session['user_id'], chapter_id=chapter.id) }}">
        <!--form method="POST"-->

        <div class="mb-3 text-start">
            <label for="chapter_name" class="form-label">Name :</label>
            <input type="text" class="form-control border-primary" id="chapter_name" name="chapter_name" value="{{chapter.name}}" required>
        </div>
        <div class="mb-3 text-start">
            <label for="chapter_description" class="form-label">Description :</label> 
            <textarea class="form-control border-primary" id="chapter_description" name="chapter_description" rows="3">{{ chapter.description }}</textarea>

        </div>
        
        {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
            {% for category, message in messages %}
                <p class="alert alert-{{ category }}">{{ message}}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}        
        <button type="submit" class="btn btn-primary me-2">Save</button>
        <a href="{{ url_for('admin_dashboard', curr_login_id=session['user_id'])}}" class="btn btn-primary">Cancel</a>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
