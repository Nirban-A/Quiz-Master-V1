<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User Details</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}" />

</head>

<body>
    <div class="container my-5 p-4 border rounded shadow bg-white text-center" style="max-width: 500px;">
        <h2 class="text-primary">Welcome to Quiz Master</h2>
        <p>Registration</p>

        <form method="POST" action="{{ url_for('edit_user',curr_login_id=session['user_id'], user_id=user.id)}}">

            <div class="mb-3 text-start">
                <label for="username" class="form-label">Email</label>
                <input type="text" class="form-control border-primary" value="{{user.username}}" id="username" name="username" required>

            </div>
            <div class="mb-3 text-start">
                <label for="name" class="form-label">Full name:</label>
                <input type="text" class="form-control border-primary" value="{{user.full_name}}" id="name" name="name" required>
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control border-primary" id="password" name="password" required>
            </div>

            <div class="mb-3 text-start">
                <label for="qualification" class="form-label">Qualification:</label>
                <input type="text" class="form-control border-primary" value="{{user.qualification}}" id="qualification" name="qualification">
            </div>


            {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
            {% for category, message in messages %}
            <p class="alert alert-{{ category }}">{{ message}}</p>
            {% endfor %}
            {% endif %}
            {% endwith %}


            <input type="submit" class="btn btn-primary w-100 mt-3">
        </form>

        <p class="signup mt-3"> <a href="{{ url_for('admin_dashboard_users',curr_login_id=session['user_id']) }}">Cancel</a></p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
