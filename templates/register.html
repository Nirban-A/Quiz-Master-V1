<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Registration</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
    <!--link rel="stylesheet" type="text/css" href="/static/style.css"-->

</head>

<body>
    <div class="container">
        <h2 class="text-primary">Welcome to Quiz Master</h2>
        <p class="register-text">Registration</p>

        <form method="POST" action="{{ url_for('register') }}">

            <div class="mb-2 text-start">
                <label for="username" class="form-label">Username (email):</label>
                <input type="email" class="form-control border-primary" id="username" name="username" placeholder="example@email.com" required>
            </div>
            <div class="mb-2 text-start">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control border-primary" id="password" name="password" required>
            </div>
            <div class="mb-2 text-start">
                <label for="name" class="form-label">Full name:</label>
                <input type="text" class="form-control border-primary" id="name" name="name" required>
            </div>
            <div class="mb-2 text-start"> 
                <label for="qualification" class="form-label">Qualification:</label>
                <input type="text" class="form-control border-primary" id="qualification" name="qualification">
            </div>
            <div class="mb-2 text-start">
                <label for="dob" class="form-label">Date of Birth:</label>
                <input type="date" class="form-control border-primary" id="dob" name="dob">
            </div>

        {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="alert alert-{{ category }}">{{ message}}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}


            <input type="submit" class="btn btn-primary w-100 mt-2">
        </form>

        <p class="signup mt-3"> <a href="{{ url_for('login') }}">Existing user?</a></p>
    </div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
